<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Dashboard (Excel Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">Social Hygiene Dashboard</h1>
            <div class="text-sm text-slate-500">Source: <span class="font-mono">data.xlsx</span></div>
        </div>

        <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-semibold mb-4">Gender Distribution</h3>
                <canvas id="genderChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-semibold mb-4">Age Groups (%)</h3>
                <canvas id="ageChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-semibold mb-4">Services Provided</h3>
                <canvas id="serviceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION: The name of your excel file in GitHub
        const EXCEL_FILE_PATH = 'data.xlsx';

        async function initDashboard() {
            try {
                // Fetch the Excel file from your GitHub repo
                const response = await fetch(EXCEL_FILE_PATH);
                const arrayBuffer = await response.arrayBuffer();
                
                // Parse the Excel Data
                const workbook = XLSX.read(arrayBuffer);
                const firstSheetName = workbook.SheetNames[0];
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName]);

                processAndRender(rawData);
            } catch (error) {
                console.error("Error loading Excel:", error);
                document.body.innerHTML = `<div class="p-20 text-center">
                    <h1 class="text-2xl font-bold text-red-600">Excel File Not Found</h1>
                    <p>Make sure "data.xlsx" is uploaded to your GitHub repository.</p>
                </div>`;
            }
        }

        function processAndRender(data) {
            // Count Gender
            const male = data.filter(d => d.Gender === 'Male').length;
            const female = data.filter(d => d.Gender === 'Female').length;

            // Count Age Groups
            const ages = {"18-25": 0, "26-35": 0, "36-50": 0, "51+": 0};
            data.forEach(d => { if(ages[d.AgeGroup] !== undefined) ages[d.AgeGroup]++ });

            // Count Services
            const services = {};
            data.forEach(d => { services[d.Service] = (services[d.Service] || 0) + 1 });

            // Update Summary Cards
            document.getElementById('stats').innerHTML = `
                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                    <p class="text-slate-500 text-sm font-bold uppercase">Total Patients</p>
                    <p class="text-3xl font-bold">${data.length}</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-indigo-500">
                    <p class="text-slate-500 text-sm font-bold uppercase">Males</p>
                    <p class="text-3xl font-bold">${male}</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-purple-500">
                    <p class="text-slate-500 text-sm font-bold uppercase">Females</p>
                    <p class="text-3xl font-bold">${female}</p>
                </div>
            `;

            // Render Charts
            createChart('genderChart', 'pie', ['Male', 'Female'], [male, female], ['#3b82f6', '#a855f7']);
            createChart('ageChart', 'bar', Object.keys(ages), Object.values(ages), '#10b981');
            createChart('serviceChart', 'doughnut', Object.keys(services), Object.values(services), ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6']);
        }

        function createChart(id, type, labels, data, colors) {
            new Chart(document.getElementById(id), {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: colors }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        initDashboard();
    </script>
</body>
</html>
